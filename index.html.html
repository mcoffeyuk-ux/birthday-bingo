<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Birthday Bingo 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:url('IMG_0411.png') no-repeat center center fixed;
  background-size:cover;
}

.overlay {
  background:rgba(255,255,255,0.92);
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  max-width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  text-align:center;
}

h1 {
  margin-bottom:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.item {
  padding:14px;
  border-radius:12px;
  background:#fff;
  border:2px solid #ddd;
  cursor:pointer;
  font-size:14px;
  transition:all 0.25s ease;
}

.item:hover {
  transform:scale(1.05);
}

.checked {
  background:#4caf50;
  color:#fff;
  text-decoration:line-through;
  border-color:#4caf50;
  animation:pop 0.3s ease;
}

@keyframes pop {
  0% { transform:scale(0.8); }
  100% { transform:scale(1); }
}

#bingo {
  display:none;
  margin-top:15px;
  font-size:24px;
  font-weight:600;
  color:#ff4081;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity:0}
  to {opacity:1}
}

button {
  margin-top:15px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#ff4081;
  color:white;
  font-weight:600;
  cursor:pointer;
}

</style>
</head>

<body>
<div class="overlay">
  <h1>Birthday Bingo 🎉</h1>
  <div class="grid" id="grid"></div>
  <div id="bingo">🎉 BINGO! 🎉</div>
  <button onclick="resetGame()">Reset</button>
</div>

<audio id="tickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const items = [
  "I chose that outfit",
  "It's my playlist",
  "They are all my friends",
  "I chose these decorations",
  "I organised the drinks",
  "I told him how many bags of ice to get",
  "This is my table cloth",
  "I organised this party",
  "Someone says 'who organised this?'"
];

let state = Array(items.length).fill(false);
const grid = document.getElementById('grid');

items.forEach((text, i) => {
  const div = document.createElement('div');
  div.className = 'item';
  div.innerText = text;

  div.onclick = () => {
    state[i] = !state[i];
    div.classList.toggle('checked');
    document.getElementById('tickSound').play();
    checkWin();
  };

  grid.appendChild(div);
});

function checkWin() {
  if(state.every(v => v)) {
    document.getElementById('bingo').style.display = 'block';
    document.getElementById('winSound').play();
  }
}

function resetGame() {
  state.fill(false);
  document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
  document.getElementById('bingo').style.display = 'none';
}
</script>
</body>
</html>
